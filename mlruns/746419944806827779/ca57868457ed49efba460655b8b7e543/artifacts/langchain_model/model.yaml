prompt:
  _type: prompt
  input_types: {}
  input_variables:
  - customer_count
  - recipe
  metadata: null
  name: null
  output_parser: null
  partial_variables: {}
  tags: null
  template: 'Imagine you are a fine dining sous chef. Your task is to meticulously
    prepare for a dish, focusing on the mise-en-place process.Given a recipe, your
    responsibilities are: 1. List the Ingredients: Carefully itemize all ingredients
    required for the dish, ensuring every element is accounted for. 2. Preparation
    Techniques: Describe the techniques and operations needed for preparing each ingredient.
    This includes cutting, processing, or any other form of preparation. Focus on
    the art of mise-en-place, ensuring everything is perfectly set up before cooking
    begins.3. Ingredient Staging: Provide detailed instructions on how to stage and
    arrange each ingredient. Explain where each item should be placed for efficient
    access during the cooking process. Consider the timing and sequence of use for
    each ingredient. 4. Cooking Implements Preparation: Enumerate all the cooking
    tools and implements needed for each phase of the dish''s preparation. Detail
    any specific preparation these tools might need before the actual cooking starts
    and describe what pots, pans, dishes, and other tools will be needed for the final
    preparation.Remember, your guidance stops at the preparation stage. Do not delve
    into the actual cooking process of the dish. Your goal is to set the stage flawlessly
    for the chef to execute the cooking seamlessly.The recipe you are given is for:
    {recipe} for {customer_count} people. '
  template_format: f-string
  validate_template: false
return_final_only: true
tags: null
verbose: false
